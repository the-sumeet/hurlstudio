<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-900 p-4">

  <div class="py-32">
    <h1 class="w-full text-center text-white font-extrabold text-6xl md:text-8xl">GUI for HURL</h1>
  </div>

  <div class="w-full flex justify-center">
    <img src="./img.png" alt="" class="border-white border rounded-xl max-w-4xl w-full">
  </div>

  <div class="bg-gray-900 py-24 sm:py-32">

    <div class="mx-auto mt-16 max-w-7xl px-6 sm:mt-20 md:mt-24 lg:px-8">
      <dl
        class="mx-auto grid max-w-2xl grid-cols-1 gap-x-6 gap-y-10 text-base/7 text-gray-400 sm:grid-cols-2 lg:mx-0 lg:max-w-none lg:grid-cols-3 lg:gap-x-8 lg:gap-y-16">
        <div class="relative pl-9">
          <dt class="inline font-semibold text-white">


            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-code-xml-icon lucide-code-xml absolute top-1 left-1 size-5 ">
              <path d="m18 16 4-4-4-4" />
              <path d="m6 8-4 4 4 4" />
              <path d="m14.5 4-5 16" />
            </svg>

            Open source.
          </dt>
          <dd class="inline">GPLv3 license, free forever.</dd>
        </div>
        <div class="relative pl-9">
          <dt class="inline font-semibold text-white">


            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute top-1 left-1 size-5 lucide lucide-arrow-left-right-icon lucide-arrow-left-right">
              <path d="M8 3 4 7l4 4" />
              <path d="M4 7h16" />
              <path d="m16 21 4-4-4-4" />
              <path d="M20 17H4" />
            </svg>

            HURL Features
          </dt>
          <dd class="inline">Has most of the hurl features, like assertion, variables, multiple requests and responses
            in a file.
          </dd>
        </div>
        <div class="relative pl-9">
          <dt class="inline font-semibold text-white">


            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute top-1 left-1 size-5 lucide lucide-heading-icon lucide-heading">
              <path d="M6 12h12" />
              <path d="M6 20V4" />
              <path d="M18 20V4" />
            </svg>

            Markdown support.
          </dt>
          <dd class="inline">View and edit Markdown files directly within the application.</dd>
        </div>
      </dl>
    </div>
  </div>

</body>

</html>
